version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: docuagent-backend
    env_file: ${ENV_FILE:-.env}
    ports:
      - "8000:8000"
    volumes:
      # Persistir los archivos subidos: sin esto se pierden al recrear el contenedor.
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - frontend
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
      args:
        # NEXT_PUBLIC_* se inlinean en build-time (no basta el env_file en runtime).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    container_name: docuagent-frontend
    env_file: ${ENV_FILE:-.env}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 128
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: docuagent-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: docuagent-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_storage:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 256
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_storage:
  uploads:

networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
