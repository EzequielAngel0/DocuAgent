version: "3.8"

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: docuagent-tunnel
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
      - backend
    networks:
      - frontend
    restart: unless-stopped
