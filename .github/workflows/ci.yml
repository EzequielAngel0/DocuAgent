name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancela ejecuciones previas del mismo ref cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: docuagent_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.10.0
        ports: ["6333:6333"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check app tests
          ruff format --check app tests

      - name: Type check (mypy, informativo)
        run: mypy app || true

      - name: Tests (pytest)
        env:
          ENVIRONMENT: testing
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: docuagent_test
          DB_HOST: localhost
          DB_PORT: "5432"
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
        run: pytest

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api-docuagent.angelezequiel.dev/api/v1
          NEXT_PUBLIC_WS_URL: wss://api-docuagent.angelezequiel.dev/api/v1/chat/ws
          NEXT_PUBLIC_APP_NAME: DocuAgent
        run: npm run build
