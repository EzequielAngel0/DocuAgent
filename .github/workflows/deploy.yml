name: Deploy (OCIR + OCI)

# Construye y publica imágenes en OCIR y despliega por SSH en la instancia OCI.
# Permanece INACTIVO hasta que se cree la variable de repositorio
# `DEPLOY_ENABLED=true` (Settings → Secrets and variables → Actions → Variables),
# de modo que el merge a main no falle mientras no exista infraestructura.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "podman-compose*.yml"
      - "ops/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  build-push:
    name: Build + push a OCIR
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login a OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USER }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Build + push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Containerfile
          push: true
          tags: |
            ${{ secrets.OCIR_REGISTRY }}/docuagent-${{ matrix.service }}:latest
            ${{ secrets.OCIR_REGISTRY }}/docuagent-${{ matrix.service }}:${{ github.sha }}
          # Solo el frontend usa estos ARG; el backend los ignora.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_APP_NAME=${{ vars.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy SSH en OCI
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Pull + migrate + up en la instancia
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.OCI_APP_DIR }}"
            git pull --ff-only || true
            ./ops/docuagent.sh pull
            ./ops/docuagent.sh migrate
            ./ops/docuagent.sh up

      - name: Healthcheck
        run: |
          URL="${{ vars.HEALTHCHECK_URL }}"
          for i in $(seq 1 10); do
            if curl -fsS "$URL" > /dev/null; then echo "Healthcheck OK"; exit 0; fi
            echo "Intento $i falló; reintentando..."; sleep 6
          done
          echo "Healthcheck falló tras 10 intentos"; exit 1
