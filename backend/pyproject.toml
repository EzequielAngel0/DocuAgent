[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]
ignore = [
    "E501",   # longitud de línea (gestionada por el formateador)
    "B008",   # llamadas en defaults de FastAPI (Depends/File/Form)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # re-exports intencionales
